<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Bibi</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  background: #e8dcc7;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Cormorant Garamond', serif;
}

/* Envelope */
.envelope {
  position: relative;
  width: 320px;
  height: 200px;
  background: #f3e5c8;
  border: 1px solid #d6c2a3;
  cursor: pointer;
}

/* Flap */
.flap {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #e9d7b8;
  clip-path: polygon(0 0, 100% 0, 50% 60%);
  transform-origin: top;
  transition: transform 1s ease;
  z-index: 2;
}

/* Wax seal */
.seal {
  position: absolute;
  top: 70px;
  left: 50%;
  transform: translateX(-50%);
  width: 50px;
  height: 50px;
  background: #8b0000;
  border-radius: 50%;
  z-index: 3;
  transition: transform 0.5s ease, opacity 0.5s ease;
}

/* Letter container */
.letter-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 550px;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1.2s ease;
}

/* Show letter */
.show-letter {
  opacity: 1;
  transform: translateY(0);
}

/* Letter styling */
.letter {
  position: relative;
  padding: 50px;
  background: #fdf6e3;
  box-shadow: 0 10px 30px rgba(0,0,0,0.2);
  border: 1px solid #e0d3b8;
}

/* Flowers */
.flower {
  position: absolute;
  font-size: 40px;
  opacity: 0.2;
  animation: float 6s ease-in-out infinite;
}

.flower:nth-child(1) { top: 10px; left: 10px; }
.flower:nth-child(2) { top: 10px; right: 10px; }
.flower:nth-child(3) { bottom: 10px; left: 10px; }
.flower:nth-child(4) { bottom: 10px; right: 10px; }

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

/* Title */
.title {
  font-family: 'Dancing Script', cursive;
  font-size: 28px;
  margin-bottom: 20px;
}

/* Content */
.content {
  white-space: pre-line;
  font-size: 18px;
  line-height: 1.8;
  min-height: 300px;
}
</style>
</head>

<body>

<!-- Envelope -->
<div class="envelope" onclick="openEnvelope()">
  <div class="flap" id="flap"></div>
  <div class="seal" id="seal"></div>
</div>

<!-- Letter -->
<div class="letter-container" id="letterContainer">
  <div class="letter">

    <div class="flower">🌼</div>
    <div class="flower">🌼</div>
    <div class="flower">🌼</div>
    <div class="flower">🌼</div>

    <div class="title" id="title"></div>
    <div class="content" id="content"></div>

  </div>
</div>

<script>
const text = `I have found myself reflecting on our time together more often than I expected. Though our first meeting was brief—cut short by my trip to Texas—you remained on my mind in a way I could not quite explain.

Having the chance to speak with you more this time has been something I’ve genuinely enjoyed. There is something easy and refreshing about our conversations—whether it’s sharing thoughts about our days, our interests, or the things we hope for in the future.

I admire your calm presence, and the way you carry yourself. It makes every conversation feel natural, and leaves me looking forward to the next.

I’ll admit, seeing you today, I was a little nervous—perhaps more than I expected—because I find you truly beautiful.

I don’t yet know the best way to express everything I mean, but I do know that I would like to continue getting to know you, and to learn, in time, how to show you the care and attention you deserve.

— D`;

let index = 0;

function openEnvelope() {
  // Open flap
  document.getElementById("flap").style.transform = "rotateX(180deg)";

  // Break seal
  const seal = document.getElementById("seal");
  seal.style.transform = "scale(0)";
  seal.style.opacity = "0";

  // Show letter after delay
  setTimeout(() => {
    document.getElementById("letterContainer").classList.add("show-letter");
    startTyping();
  }, 800);
}

function startTyping() {
  document.getElementById("title").innerText = "To Bibi,";
  document.getElementById("content").innerText = "";
  index = 0;
  typeWriter();
}

function typeWriter() {
  if (index < text.length) {
    document.getElementById("content").innerText += text.charAt(index);
    index++;
    setTimeout(typeWriter, 20);
  }
}
</script>

</body>
</html>
